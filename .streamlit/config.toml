[theme]
base = "dark"
primaryColor = "#818cf8"
backgroundColor = "#000000"
secondaryBackgroundColor = "#0b0b0f"
textColor = "#e5e7eb"
linkColor = "#a5b4fc"
borderColor = "#1f2937"

redColor = "#f87171"
orangeColor = "#fb923c"
yellowColor = "#facc15"
greenColor = "#34d399"
blueColor = "#818cf8"
violetColor = "#a78bfa"
grayColor = "#9ca3af"

dataframeBorderColor = "#1f2937"
dataframeHeaderBackgroundColor = "#0b0b0f"

chartCategoricalColors = ["#818cf8", "#34d399", "#fb923c", "#f87171", "#a78bfa", "#22d3ee", "#9ca3af"]

font = "Inter:https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"

[server]
headless = true
runOnSave = true

[browser]
gatherUsageStats = false
